map $sent_http_content_type $is_long_cache {
    default                  0;
    application/javascript   1;
    text/css                 1;
    image/png                1;
    image/jpeg               1;
    image/svg+xml            1;
    image/webp               1;
    font/woff                1;
    font/woff2               1;
    application/font-woff    1;
    application/font-woff2   1;
    model/gltf-binary        1;
    application/octet-stream 1;
}

types {
    # nginx:alpine ships an older mime.types that doesn't know about
    # GLB. Without this the responses come back as application/octet-
    # stream which the browser caches more conservatively.
    model/gltf-binary        glb;
    model/gltf+json          gltf;
}

server {
    listen 80 default_server;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # ---- Compression ----------------------------------------------------
    # GLBs are mostly binary (textures already compressed), but the
    # geometry + JSON header chunk gzip well — typically 25-40%.
    gzip on;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        application/xml
        application/wasm
        image/svg+xml
        model/gltf-binary
        model/gltf+json
        application/octet-stream;

    # ---- Caching --------------------------------------------------------
    # Hashed Vite output (`/assets/index-XXXX.js` etc) is content-addressed
    # so we can cache it forever. GLBs under /3d-lab/ are not hashed but
    # we manually bump them on every redeploy, so 30 days is safe.
    location ~* ^/assets/ {
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location ~* ^/3d-lab/ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        # Allow the LabLoader's HEAD probes and any future range-based
        # streaming GLTFLoader integrations.
        add_header Accept-Ranges bytes;
        try_files $uri =404;
    }

    # ---- SPA fallback ---------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate";
    }
}
