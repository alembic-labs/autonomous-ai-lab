# Прод на VPS 178.18.240.104. Caddy слушает 80/443 и проксирует на сервисы.
# Host-порты 18000/18030 оставлены как fallback для прямого доступа по IP.
#   docker compose -f docker-compose.vps.yml up -d --build

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - alembic_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: ..
      dockerfile: deploy/backend.Dockerfile
    restart: unless-stopped
    ports:
      - "18000:8000"
    env_file: .env
    environment:
      PDB_STORAGE_DIR: /app/pdb_storage
      CORS_ALLOWED_ORIGINS: "https://alembic.bio,https://www.alembic.bio,http://178.18.240.104:18030,http://localhost:18030"
    volumes:
      - alembic_pdb:/app/pdb_storage
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ..
      dockerfile: deploy/frontend.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api.alembic.bio
        NEXT_PUBLIC_LAB_3D_URL: ""
    restart: unless-stopped
    ports:
      - "18030:3000"
    env_file: .env
    depends_on:
      - backend

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend

volumes:
  alembic_pg:
  alembic_pdb:
  caddy_data:
  caddy_config:
