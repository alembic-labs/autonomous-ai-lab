# Run from repo:  cd deploy && docker compose up -d --build
# Requires: deploy/.env (see .env.example)

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ..
      dockerfile: deploy/backend.Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      PDB_STORAGE_DIR: /app/pdb_storage
    volumes:
      - pdb_data:/app/pdb_storage
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ..
      dockerfile: deploy/frontend.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_LAB_3D_URL: ${NEXT_PUBLIC_LAB_3D_URL}
    restart: unless-stopped
    env_file: .env
    depends_on:
      - backend

  lab:
    build:
      context: ..
      dockerfile: deploy/lab.Dockerfile
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - postgres
      - backend
      - frontend
      - lab

volumes:
  postgres_data:
  pdb_data:
  caddy_data:
  caddy_config:
