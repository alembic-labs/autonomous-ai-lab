<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ALEMBIC LABS — 3d floor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      /*
       * Boot splash. Visible from the first HTML paint until React's
       * createRoot().render() replaces #root contents (typically 200-600ms
       * after the bundle finishes downloading). Without this the user
       * stares at a pure-black canvas for the bundle-parse window.
       *
       * Kept dependency-free: no font load required (system mono falls
       * back instantly), no images, no JS. The styled overlay
       * (LabLoader.tsx) takes over as soon as React mounts and shows
       * GLB download progress.
       */
      html,
      body,
      #root {
        margin: 0;
        height: 100%;
        background: #000;
      }
      #boot-splash {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(
            ellipse at 50% 35%,
            rgba(255, 51, 68, 0.09) 0%,
            rgba(0, 0, 0, 0) 55%
          ),
          #060606;
        color: #e8e8e8;
        font-family: "JetBrains Mono", ui-monospace, "SF Mono",
          "Menlo", monospace;
        z-index: 100;
        opacity: 1;
        transition: opacity 320ms ease;
        pointer-events: none;
      }
      #boot-splash.boot-splash-fade {
        opacity: 0;
      }
      .boot-splash-card {
        width: min(360px, calc(100vw - 32px));
        padding: 20px 22px;
        border: 1px solid #1f1f1f;
        border-left: 2px solid #ff3344;
        background: rgba(10, 10, 10, 0.92);
        display: flex;
        flex-direction: column;
        gap: 10px;
        box-shadow: 0 14px 38px rgba(0, 0, 0, 0.55);
      }
      .boot-splash-mark {
        display: flex;
        align-items: center;
        gap: 10px;
        text-transform: uppercase;
        letter-spacing: 0.14em;
        font-size: 11px;
        color: #a8a8a8;
      }
      .boot-splash-pulse {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #ff3344;
        box-shadow: 0 0 12px rgba(255, 51, 68, 0.7);
        animation: bootSplashPulse 1.3s ease-in-out infinite;
      }
      @keyframes bootSplashPulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.5); opacity: 0.55; }
      }
      .boot-splash-mark-text { color: #e8e8e8; font-weight: 600; }
      .boot-splash-title {
        font-size: 13px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: #e8e8e8;
      }
      .boot-splash-sub {
        font-size: 10px;
        color: #6a6a6a;
        line-height: 1.5;
        letter-spacing: 0.04em;
      }
      .boot-splash-bar {
        position: relative;
        height: 3px;
        background: rgba(255, 255, 255, 0.05);
        overflow: hidden;
      }
      .boot-splash-bar::after {
        content: "";
        position: absolute;
        top: 0;
        bottom: 0;
        left: -40%;
        width: 40%;
        background: linear-gradient(
          90deg,
          rgba(255, 51, 68, 0) 0%,
          #ff3344 60%,
          rgba(255, 51, 68, 0) 100%
        );
        animation: bootSplashSweep 1.4s linear infinite;
      }
      @keyframes bootSplashSweep {
        0% { left: -40%; }
        100% { left: 100%; }
      }
    </style>
  </head>
  <body>
    <!--
      Boot splash lives OUTSIDE #root so React's createRoot().render()
      doesn't tear it down on first commit. main.tsx fades + removes it
      explicitly two animation frames after the App renders, which
      bridges the gap between the inline HTML and the React loader
      without any black flash in between.
    -->
    <div id="boot-splash">
      <div class="boot-splash-card">
        <div class="boot-splash-mark">
          <span class="boot-splash-pulse" aria-hidden="true"></span>
          <span class="boot-splash-mark-text">ALEMBIC LABS</span>
        </div>
        <div class="boot-splash-title">booting 3d laboratory</div>
        <div class="boot-splash-bar" aria-hidden="true"></div>
        <div class="boot-splash-sub">
          initializing webgl context · loading scene
        </div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
